<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %} {% endblock %}</title>
    {% block head %} {% endblock %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

</head>

<body>

    <header>

        <div class="container d-flex justify-content-between mt-3">
            <div class="row">
                <a class="text-dark text-decoration-none" href="{{url_for ('homepage')}}"><h5>Biblioteca fodastica</h5></a>
            </div>

            <!-- Páginas -->
            <div>
                <a href="{{url_for ('homepage')}}" class="btn btn-outline-dark"> Página inicial </a>
            </div>
            
            <!-- Login -->
            <div class="row">
                <a href="{{url_for ('login_page')}}" class="btn btn-outline-dark border border-0">Login</a>
            </div>
        </div>

    </header>

    {% block content %} {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>

</body>

</html>
